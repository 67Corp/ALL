name: 🚀 Déploiement Infomaniak

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Note de déploiement (optionnel)'
        required: false
        default: ''

jobs:
  deploy:
    name: Déployer sur Infomaniak
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Installer lftp
        run: sudo apt-get install -y lftp

      - name: 📤 Déployer via FTP
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }};
            mirror --reverse --delete --verbose \
              --exclude .git \
              --exclude .github \
              --exclude README.md \
              --exclude config/config.php \
              --exclude config/db.php \
              ./ ${{ secrets.FTP_PATH }};
            bye
          "

      - name: ✅ Résumé
        if: success()
        run: |
          echo "### ✅ Déployé avec succès !" >> $GITHUB_STEP_SUMMARY
          echo "Branche : \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Par : @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
